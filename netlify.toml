# Netlify configuration for clearhead.in
# Functions live in netlify/functions and are exposed under /api/* via the redirects below.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# www → non-www canonical redirect
[[redirects]]
  from = "https://www.clearhead.in/*"
  to = "https://clearhead.in/:splat"
  status = 301
  force = true

# Trailing slash normalization only (Netlify Pretty URLs handle clean URLs at 200; canonical tags point to .html)
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301

# Friendly /api/* paths -> serverless functions
[[redirects]]
  from = "/api/create-order"
  to = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200

[[redirects]]
  from = "/api/razorpay-webhook"
  to = "/.netlify/functions/razorpay-webhook"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
