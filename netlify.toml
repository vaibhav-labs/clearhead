# Netlify configuration for clearhead.in
# Functions live in netlify/functions and are exposed under /api/* via the redirects below.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# www → non-www canonical redirect (fixes "Page with redirect" in Google Search Console)
[[redirects]]
  from = "https://www.clearhead.in/*"
  to = "https://clearhead.in/:splat"
  status = 301
  force = true

# Clean URL → .html canonical redirects (prevents duplicate-content from Netlify Pretty URLs)
[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/post-ai"
  to = "/post-ai.html"
  status = 301

[[redirects]]
  from = "/post-ai-loneliness"
  to = "/post-ai-loneliness.html"
  status = 301

[[redirects]]
  from = "/post-unheard"
  to = "/post-unheard.html"
  status = 301

[[redirects]]
  from = "/post-lonely"
  to = "/post-lonely.html"
  status = 301

[[redirects]]
  from = "/post-conversation"
  to = "/post-conversation.html"
  status = 301

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 301

# Friendly /api/* paths -> serverless functions
[[redirects]]
  from = "/api/create-order"
  to = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200

[[redirects]]
  from = "/api/razorpay-webhook"
  to = "/.netlify/functions/razorpay-webhook"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
